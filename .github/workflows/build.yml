name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: List files to inspect structure
      run: ls -R

    - name: Grant execute permission for gradlew
      run: chmod +x ./AndroidVM-Main/gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug
      working-directory: ./AndroidVM-Main

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: ./AndroidVM-Main/app/build/outputs/apk/debug/app-debug.apk
