name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Find and build APK
      run: |
        # Buscar dónde está el gradlew en el repositorio y darle permisos
        GRADLEW_PATH=$(find . -name "gradlew" -type f)
        echo "Encontrado en: $GRADLEW_PATH"
        chmod +x "$GRADLEW_PATH"
        
        # Obtener la carpeta donde está el gradlew para compilar desde ahí
        PROJECT_DIR=$(dirname "$GRADLEW_PATH")
        cd "$PROJECT_DIR"
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: '**/app/build/outputs/apk/debug/app-debug.apk'
