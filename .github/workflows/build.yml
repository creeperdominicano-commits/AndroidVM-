name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Find, Grant Permission and Build APK
      run: |
        echo "=== LISTANDO CONTENIDO ACTUAL ==="
        ls -la
        
        echo "=== BUSCANDO GRADLEW ==="
        GRADLEW_PATH=$(find . -name "gradlew" -type f)
        echo "Ruta encontrada: $GRADLEW_PATH"
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "¡Error: No se encontró el archivo gradlew en ninguna parte!"
          exit 1
        fi
        
        chmod +x "$GRADLEW_PATH"
        
        PROJECT_DIR=$(dirname "$GRADLEW_PATH")
        echo "Cambiando a directorio: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: '**/app/build/outputs/apk/debug/app-debug.apk'
